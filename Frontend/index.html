<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Server Monitor</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/note.css">
    <script src="./js/jsencrypt.min.js"></script>
    <script src="./js/function.js"></script>
    <script src="./js/index.js"></script>
</head>

<body class="page-body">
    <div class="container-main">
        <section>
            <h2 class="section-title text-blue" data-langId="cpuTip">CPU负载</h2>
            <div class="cpu-grid">
                <div class="card-stat">
                    <span class="stat-label" data-langId="min1">1 分钟内</span>
                    <div id="load-1" class="stat-value">-</div>
                </div>
                <div class="card-stat">
                    <span class="stat-label" data-langId="min5">5 分钟内</span>
                    <div id="load-5" class="stat-value">-</div>
                </div>
                <div class="card-stat">
                    <span class="stat-label" data-langId="min15">15 分钟内</span>
                    <div id="load-15" class="stat-value">-</div>
                </div>
                <div class="card-stat">
                    <span class="stat-label">Tasks (A/T)</span>
                    <div id="load-tasks" class="stat-value text-blue-alt">-</div>
                </div>
            </div>
        </section>

        <section>
            <div class="section-header">
                <h2 class="section-title text-green" data-langId="mem">内存负载</h2>
                <div id="mem-usage-text" class="usage-text">-% Used</div>
            </div>
            <div id="mem-grid" class="mem-grid"></div>
        </section>

        <section>
            <div class="section-header control-header">
                <h2 class="section-title text-purple" data-langId="controlTip">服务控制</h2>
                <div class="token-upload">
                    <label class="token-label" data-langId="token">操作令牌:</label>
                    <input type="file" id="token-file" accept=".pem,*" class="file-input">
                </div>
            </div>
            <div id="service-grid" class="service-grid"></div>
        </section>
    </div>
    <div class="notes-container"></div>
</body>

</html>
