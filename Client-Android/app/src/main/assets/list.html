<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="./css/list.css">
    <link rel="stylesheet" href="./css/note.css">
    <script src="./js/function.js"></script>
    <title>Server List</title>
</head>

<body>
    <div class="container">
        <h3 data-langId="title">服务器列表</h3>

        <div id="inputSection">
            <div class="input-group">
                <a data-langId="name">服务器别名:</a>
                <input type="text" id="name" placeholder="Server Name">
                <a data-langId="url1">数据URL路径:</a>
                <input type="url" id="dataUrl" placeholder="https://example.org/svrmgr/data/">
                <a data-langId="url2">API URL路径:</a>
                <input type="url" id="apiUrl" placeholder="https://example.org/svrmgr/control.php">
                <a data-langId="interval">刷新间隔 (单位: ms):</a>
                <input type="number" id="interval" placeholder="1000">
                <a data-langId="token">选择令牌文件:</a>
                <input type="file" id="tokenFile" accept=".pem,*.*">
                <button class="btn-confirm" data-langId="add">添加</button>
            </div>
        </div>

        <div id="cardList">
        </div>

        <div class="button-row">
            <button class="btn-add" data-langId="add">添加</button>
            <button class="btn-del" data-langId="del">删除</button>
        </div>
    </div>
    <script src="./js/list.js"></script>
</body>

</html>
