<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="./css/detal.css">
    <link rel="stylesheet" href="./css/note.css">
    <script>
        (function () {
            var ua = navigator.userAgent;
            var chromeMatch = ua.match(/Chrome\/(\d+)/);
            if (chromeMatch && parseInt(chromeMatch[1], 10) < 55) {
                window.location.replace('error.html');
            }
        })();
    </script>
    <script src="./js/jsencrypt.min.js"></script>
    <script src="./js/function.js"></script>
    <script src="./js/detal.js"></script>
    <title>Server Manager</title>
</head>

<body class="bg-body text-gray-300 font-sans antialiased">
    <div class="container-main space-y-8">

        <section>
            <h2 class="section-title text-blue-500" data-langId="cpuTip">CPU负载</h2>
            <div class="cpu-grid shadow-2xl">
                <div class="stat-card">
                    <span class="stat-label" data-langId="min1">1 分钟内</span>
                    <div id="load-1" class="stat-value text-white">-</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label" data-langId="min5">5 分钟内</span>
                    <div id="load-5" class="stat-value text-white">-</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label" data-langId="min15">15 分钟内</span>
                    <div id="load-15" class="stat-value text-white">-</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Tasks (A/T)</span>
                    <div id="load-tasks" class="stat-value text-blue-400 font-mono">-</div>
                </div>
            </div>
        </section>

        <section>
            <div class="section-header">
                <h2 class="section-title text-green-500" data-langId="mem">内存负载</h2>
                <div id="mem-usage-text" class="usage-text">-% Used</div>
            </div>
            <div id="mem-grid" class="mem-grid">
            </div>
        </section>

        <section>
            <div class="section-header">
                <h2 class="section-title text-purple-500" data-langId="controlTip">服务控制</h2>
            </div>
            <div id="service-grid" class="service-grid">
            </div>
        </section>
    </div>
    <div class="notes-container">
    </div>
</body>

</html>
